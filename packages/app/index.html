<!doctype html> 
<html lang="en" style="background-color: var(--background-base)">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
  <title>OpenCode</title>
  <link rel="icon" type="image/png" href="/favicon-96x96-v3.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon-v3.svg" />
  <link rel="shortcut icon" href="/favicon-v3.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v3.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#F8F7F7" />
  <meta property="og:image" content="/social-share.png" />
  <meta property="twitter:image" content="/social-share.png" />
  <script id="oc-theme-preload-script" src="/oc-theme-preload.js"></script>
</head>

<body class="antialiased overscroll-none text-12-regular overflow-hidden">
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root" class="flex flex-col h-dvh p-px">
    <div id="welcome-loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;background:#181818;z-index:9999;transition:opacity 0.5s ease, visibility 0.5s ease;">
      <style>
        @keyframes wl-type { from { width: 0; } to { width: 8ch; } }
        @keyframes wl-blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
      </style>
      <div style="font-family:'SF Mono','Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace;display:flex;align-items:baseline;gap:4px;font-size:48px;font-weight:700;color:#e8e8e8;letter-spacing:-0.03em;">
        <img src="/favicon-96x96-v3.png" alt="" width="48" height="48" style="border-radius:10px;position:relative;top:2px;" />
        <span style="overflow:hidden;white-space:nowrap;border-right:3px solid #6ee7b7;width:0;animation:wl-type 1.5s steps(8) 0.2s forwards,wl-blink 0.8s step-end 1.8s 3;">opencode</span>
      </div>
    </div>
  </div>
  <script src="/src/entry.tsx" type="module"></script>
</body>

</html>
